<!DOCTYPE html>
<html>
<head>
    <title>Frames Webpage Example</title>
    <style>
        body {
            margin: 0;
            font-family: Arial;
        }

        .header {
            background-color: #4CAF50;
            color: white;
            text-align: center;
            padding: 15px;
        }

        .container {
            display: flex;
            height: 90vh;
        }

        .menu {
            width: 25%;
            background-color: #f2f2f2;
            padding: 10px;
        }

        .content {
            width: 75%;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        a {
            display: block;
            margin: 10px 0;
            text-decoration: none;
            color: blue;
        }
    </style>
</head>

<body>

    <!-- Header Frame -->
    <div class="header">
        <h1>My Frames Webpage</h1>
    </div>

    <!-- Main Frame Layout -->
    <div class="container">

        <!-- Left Menu Frame -->
        <div class="menu">
            <h3>Menu</h3>

            <a href="home.html" target="contentFrame">Home</a>
            <a href="about.html" target="contentFrame">About</a>
            <a href="services.html" target="contentFrame">Services</a>
            <a href="contact.html" target="contentFrame">Contact</a>

        </div>

        <!-- Right Content Frame -->
        <div class="content">
            <iframe name="contentFrame" src="home.html"></iframe>
        </div>

    </div>

</body>
</html>
