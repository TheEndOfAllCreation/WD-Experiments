<!DOCTYPE html>
<html>
<head>
    <title>HTML Table Example</title>
    <style>
        table {
            width: 60%;
            margin: 20px auto;
            border-collapse: collapse;
            text-align: center;
        }

        th, td {
            border: 1px solid black;
            padding: 10px;
        }

        th {
            background-color: #4CAF50;
            color: white;
        }

        tr:nth-child(even) {
            background-color: #f2f2f2;
        }
    </style>
</head>

<body>

<h2 style="text-align:center;">Student Information Table</h2>

<table>
    <tr>
        <th>Roll No</th>
        <th>Name</th>
        <th>Department</th>
        <th>Marks</th>
    </tr>

    <tr>
        <td>1</td>
        <td>Amit</td>
        <td>Computer</td>
        <td>85</td>
    </tr>

    <tr>
        <td>2</td>
        <td>Pooja</td>
        <td>IT</td>
        <td>90</td>
    </tr>

    <tr>
        <td>3</td>
        <td>Rahul</td>
        <td>Mechanical</td>
        <td>78</td>
    </tr>

    <tr>
        <td>4</td>
        <td>Sneha</td>
        <td>Civil</td>
        <td>88</td>
    </tr>

</table>

</body>
</html>
